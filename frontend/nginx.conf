# -----------------------------------------------------------------------
# Server 1 — DNS sinkhole block page (default_server)
#
# When the DNS engine returns the ClassGuard server IP for a blocked
# domain, the browser connects here with Host: blocked-site.com.
# Since that hostname doesn't match the ClassGuard server_name below,
# nginx falls through to this default_server and serves the block page.
# -----------------------------------------------------------------------
server {
    listen 80 default_server;

    # Forces nginx to re-resolve "api" per-request (subject to valid=10s)
    # instead of caching whatever IP it had at config load forever — the
    # api container gets recreated (new IP) on every deploy/rebuild, and
    # without this every proxy_pass below silently 502s until something else
    # happens to reload nginx. Same fix already applied to scep below.
    resolver 127.0.0.11 valid=10s;

    # Proxy the public branding API so the block page can load
    # school logo / message without knowing the real ClassGuard hostname.
    # The browser fetches /api/v1/branding as a same-origin request.
    location /api/v1/branding {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # The block page's "Request to unblock" and "Have an override code?"
    # forms POST here as same-origin requests too — without these, both
    # fall through to location / below and get the block page's own HTML
    # back instead of a JSON response, which the page's own JS can't parse
    # (its catch-all "Request failed" message gives no real detail why).
    location /api/v1/unblock-requests {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/override-codes/verify {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ACME HTTP-01 challenge (Let's Encrypt) — also handled here in case the
    # validator's request doesn't carry the CLASSGUARD_HOST Host header.
    location /.well-known/acme-challenge/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Everything else: serve the block page
    location / {
        root         /usr/share/nginx/html;
        default_type text/html;
        try_files    /blocked-dns.html =404;
    }
}

# -----------------------------------------------------------------------
# Server 1b — DNS sinkhole block page, HTTPS (port 443 default_server)
#
# Almost every real site is HTTPS-only today, so most blocked-domain visits
# hit this, not Server 1. Without this block there was only ONE listener on
# 443 at all (the admin SPA below) — Host/SNI mismatches had nowhere else to
# fall through to, so a blocked HTTPS site showed ClassGuard's admin login
# screen instead of "Site Blocked".
#
# This does NOT remove the browser's certificate warning — nginx is
# presenting ClassGuard's own cert for a domain it has no cert for, which is
# unavoidable without installing a trusted root CA on every device (real TLS
# interception, deliberately not what ClassGuard does). It only fixes what
# the student sees *after* they click through that warning.
# -----------------------------------------------------------------------
server {
    listen 443 ssl default_server;

    # See Server 1's identical resolver comment.
    resolver 127.0.0.11 valid=10s;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    location /api/v1/branding {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/unblock-requests {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/override-codes/verify {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root         /usr/share/nginx/html;
        default_type text/html;
        try_files    /blocked-dns.html =404;
    }
}

# -----------------------------------------------------------------------
# Server 2a — ClassGuard admin SPA, plain HTTP (port 80)
#
# Once a real Let's Encrypt cert is on disk (see acmeTls.js's
# writeCertToDisk — the .le-active marker it writes is the signal; the
# frontend's own self-signed placeholder, generated by
# docker-entrypoint-tls.sh, never reaches that code path), redirect to
# HTTPS. Before that, fall through and serve the SPA over plain HTTP —
# redirecting unconditionally would break first-time admin access on a
# brand new install that hasn't issued a cert yet (nothing is listening to
# redirect TO until then).
# -----------------------------------------------------------------------
server {
    listen 80;
    server_name ${CLASSGUARD_HOST} ${VRRP_VIP} ${CLASSGUARD_DOMAIN} localhost 127.0.0.1;
    root  /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — lets every proxy_pass below resolve lazily,
    # per request (subject to valid=10s), instead of once at nginx startup.
    # Two independent reasons this matters: (1) a standby node deliberately
    # never runs the scep container (its Postgres is read-only, same reason
    # Kea is skipped — see install.sh), so a bare proxy_pass to "scep" with
    # no resolver fails nginx's entire config load with "host not found in
    # upstream", taking down every other site on this listener, not just
    # /scep/; (2) the api container gets a new IP every time it's recreated
    # (every deploy/rebuild) — without forced re-resolution, every /api/
    # proxy_pass below silently 502s against the old dead IP until nginx
    # itself happens to reload for some unrelated reason.
    resolver 127.0.0.11 valid=10s;

    # ACME HTTP-01 challenge — must always stay plain-HTTP reachable, both
    # for the very first issuance and every renewal afterward, regardless
    # of the redirect below.
    location /.well-known/acme-challenge/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # routes/ha.js's cross-node liveness probe hits {api_url}/health over
    # plain HTTP, where api_url is each node's bare IP. Once a real cert is
    # active, that would otherwise fall through to the redirect below and
    # come back https://<bare-ip>/health — which always fails TLS
    # verification (the cert's SAN list covers the public domain, not a raw
    # IP), making every node with a real cert permanently show "Slow" on the
    # HA page regardless of actual health. Must stay plain-HTTP, same as the
    # ACME challenge above.
    location /health {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Page loads redirect to HTTPS once a real cert exists. Everything else
    # below (API, sockets, downloads) stays reachable over plain HTTP
    # unconditionally — only the browser-facing page load needs to force a
    # scheme switch; a direct API/asset request isn't a security regression
    # since today, before this change, ALL of this was plain-HTTP-only.
    location / {
        if (-f /etc/nginx/certs/.le-active) {
            return 301 https://$host$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    location /api/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # WebSocket / Socket.io upgrade
    location /socket.io/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Metrics proxy
    location /metrics {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # SCEP server — a Mosyle-managed device enrolling for its VPN client
    # cert hits this directly (its SCEP profile's URL points here), often
    # from off-network, so it has to ride the same public domain/cert as
    # everything else rather than needing on-LAN access.
    location /scep/ {
        set $scep_upstream "scep:8080";
        # scepserver itself isn't mounted under /scep/ -- it expects paths
        # rooted at /. Strip the prefix nginx matched on before forwarding
        # ($request_uri can't be used here like the api locations above do,
        # since it always carries the *unstripped* original path).
        rewrite           ^/scep/(.*)$ /$1 break;
        proxy_pass         http://$scep_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Long-cache for immutable static assets
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Extension build output — same filenames every build, never long-cached.
    location /downloads/ {
        add_header Cache-Control "no-cache";
        types {
            application/x-chrome-extension crx;
            application/xml                xml;
            text/plain                     txt;
            application/zip                zip;
        }
    }
}

# -----------------------------------------------------------------------
# Server 2b — ClassGuard admin SPA, HTTPS (port 443)
#
# CLASSGUARD_HOST is injected at container startup via envsubst.
# Set it in docker-compose or .env to your server's IP or hostname
# so that admin access routes here instead of the block page.
# -----------------------------------------------------------------------
server {
    listen 443 ssl;
    # VRRP_VIP is blank on a node that isn't part of an HA pair — set it once
    # in .env after configuring the virtual IP below, so the admin UI (not
    # the DNS block page) loads when reached via the floating IP, on
    # whichever node currently holds it.
    server_name ${CLASSGUARD_HOST} ${VRRP_VIP} ${CLASSGUARD_DOMAIN} localhost 127.0.0.1;
    root  /usr/share/nginx/html;
    index index.html;

    # See Server 2a's identical resolver comment — needed for the /scep/
    # proxy_pass below to resolve lazily instead of failing nginx startup
    # entirely on a standby, which never runs the scep container.
    resolver 127.0.0.11 valid=10s;

    # Self-signed until a real cert is issued (Settings -> TLS / HA Cluster page).
    # The entrypoint script generates a placeholder so nginx always has something
    # to load; the watcher reloads nginx automatically once a real cert lands here.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # SPA routing — all unknown paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ACME HTTP-01 challenge (Let's Encrypt) — must be plain HTTP-reachable;
    # served by the backend (see services/acmeTls.js), not a static file.
    location /.well-known/acme-challenge/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Proxy API calls to the backend container
    location /api/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # WebSocket / Socket.io upgrade
    location /socket.io/ {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Metrics proxy
    location /metrics {
        set $api_upstream "api:3001";
        proxy_pass         http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # SCEP server — see Server 2a's identical block for why this needs to
    # be reachable on the public domain, not just on-LAN.
    location /scep/ {
        set $scep_upstream "scep:8080";
        # scepserver itself isn't mounted under /scep/ -- it expects paths
        # rooted at /. Strip the prefix nginx matched on before forwarding
        # ($request_uri can't be used here like the api locations above do,
        # since it always carries the *unstripped* original path).
        rewrite           ^/scep/(.*)$ /$1 break;
        proxy_pass         http://$scep_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Long-cache for immutable static assets
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Extension build output (zip/crx/update.xml/extension-id.txt) — same
    # filenames on every build, so this must never be long-cached the way
    # hashed frontend assets above are, or Chrome's update checker (and
    # admins re-downloading the zip) could see a stale version.
    location /downloads/ {
        add_header Cache-Control "no-cache";
        types {
            application/x-chrome-extension crx;
            application/xml                xml;
            text/plain                     txt;
            application/zip                zip;
        }
    }
}
