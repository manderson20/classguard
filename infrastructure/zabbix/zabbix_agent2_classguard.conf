# ClassGuard checks for Zabbix agent 2 — installed to
# /etc/zabbix/zabbix_agent2.d/classguard.conf by install-zabbix-agent2.sh.
#
# Requirements (the installer sets all of this up):
#   - zabbix user in the docker group  (docker plugin + the metrics blob below)
#   - zabbix user in the freerad group (traverse /etc/freeradius for the EAP cert)
#   - agent Timeout raised: docker exec + a DB-backed API call can exceed the 3s default

Timeout=15

# The whole ClassGuard application metrics blob (JSON) in one call — the
# template parses it into ~40 dependent items with JSONPath, so the API is
# polled once per cycle no matter how many items exist. Runs inside the API
# container because the /metrics localhost-token exemption applies to the
# container's own loopback only: from the host, docker-proxy rewrites the
# source address, so a plain curl to 127.0.0.1:3001 gets a 401.
UserParameter=classguard.api.metrics,docker exec classguard-api wget -qO- -T 10 http://localhost:3001/metrics 2>/dev/null

# 1 if this host currently holds the given VRRP VIP, else 0. Host-level
# ground truth to cross-check against the API's is_vrrp_master claim.
UserParameter=classguard.vip.held[*],ip -4 addr show 2>/dev/null | grep -qF "inet $1/" && echo 1 || echo 0

# Days until the FreeRADIUS EAP certificate expires (-1 if unreadable).
# When ACME is enabled this mirrors tls_cert_days_remaining from the API;
# when it isn't, this is the only view of the self-signed cert's lifetime.
UserParameter=classguard.eap.cert.days,d=$(openssl x509 -enddate -noout -in /etc/freeradius/3.0/certs/server.crt 2>/dev/null | cut -d= -f2); if [ -n "$d" ]; then echo $(( ($(date -d "$d" +%s) - $(date +%s)) / 86400 )); else echo -1; fi

# Failed-update markers left by the update watcher. The watcher only writes
# these on failure and never cleans them up, so alert on the count
# *increasing* (a new failure), not on it being non-zero.
UserParameter=classguard.update.failed.count,find /var/log/classguard-updates -name 'update-failed-*.log' 2>/dev/null | wc -l
UserParameter=classguard.update.failed.latest,v=$(find /var/log/classguard-updates -name 'update-failed-*.log' -printf '%T@\n' 2>/dev/null | sort -rn | head -n1 | cut -d. -f1); if [ -n "$v" ]; then echo "$v"; else echo 0; fi
