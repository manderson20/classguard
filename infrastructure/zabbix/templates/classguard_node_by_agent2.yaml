# ClassGuard node template for Zabbix agent 2.
#
# Written against the Zabbix 6.0 import schema, which every 6.0+ server
# (including 7.x) accepts. Import via Data collection ▸ Templates ▸ Import,
# then link it to one Zabbix host PER CLUSTER NODE, each with an agent
# interface pointing at that node's REAL IP — never the VIP. The VIP always
# answers from whichever node is MASTER, so a host pointed at it can never
# show you a failover; per-node hosts are what make the active/standby state
# visible (vrrp_state / is_vrrp_master / classguard.vip.held).
#
# Cluster-wide values (radius_*, dns_*, ha_nodes_*) come from replicated
# tables, so every node reports identical numbers — their triggers live here
# anyway for standalone installs; on an HA pair expect those alerts twice or
# disable the duplicate on one host. See ../README.md.
zabbix_export:
  version: '6.0'
  groups:
    - name: Templates/ClassGuard
  templates:
    - template: 'ClassGuard node by Zabbix agent 2'
      name: 'ClassGuard node by Zabbix agent 2'
      description: |
        Monitors one ClassGuard cluster node: application metrics (DNS filtering, RADIUS/NAC, DHCP, HA/VRRP role), host services (FreeRADIUS, keepalived, update watcher) and every classguard-* Docker container.
        Requires Zabbix agent 2 configured by infrastructure/zabbix/install-zabbix-agent2.sh.
        Set {$CLASSGUARD.VIP} to your keepalived VIP, then enable the "VRRP role disagrees with VIP ownership" trigger.
      groups:
        - name: Templates/ClassGuard
      items:
        # ------------------------------------------------------------------
        # Master item — one API call per cycle; everything below is parsed
        # out of it with JSONPath.
        # ------------------------------------------------------------------
        - name: 'ClassGuard: application metrics (raw)'
          type: ZABBIX_PASSIVE
          key: classguard.api.metrics
          delay: 1m
          value_type: TEXT
          history: '0'
          trends: '0'
          description: 'Full /metrics JSON blob fetched inside the API container.'
        # ------------------------------------------------------------------
        # Identity
        # ------------------------------------------------------------------
        - name: 'ClassGuard: version'
          type: DEPENDENT
          key: 'classguard.metric[app_version]'
          delay: '0'
          value_type: TEXT
          trends: '0'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.app_version
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[app_version],#1)<>last(/ClassGuard node by Zabbix agent 2/classguard.metric[app_version],#2)'
              name: 'ClassGuard: version changed on {HOST.NAME}'
              priority: INFO
              manual_close: 'YES'
        - name: 'ClassGuard: API uptime'
          type: DEPENDENT
          key: 'classguard.metric[uptime_seconds]'
          delay: '0'
          value_type: UNSIGNED
          units: uptime
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.uptime_seconds
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[uptime_seconds])<300'
              name: 'ClassGuard: API restarted on {HOST.NAME}'
              priority: INFO
        # ------------------------------------------------------------------
        # DNS filtering engine
        # ------------------------------------------------------------------
        - name: 'ClassGuard: DNS queries per second'
          type: DEPENDENT
          key: 'classguard.metric[dns_queries_per_second]'
          delay: '0'
          value_type: FLOAT
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.dns_queries_per_second
        - name: 'ClassGuard: DNS block rate'
          type: DEPENDENT
          key: 'classguard.metric[dns_block_rate_pct]'
          delay: '0'
          value_type: FLOAT
          units: '%'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.dns_block_rate_pct
        - name: 'ClassGuard: DNS queries (24h)'
          type: DEPENDENT
          key: 'classguard.metric[dns_queries_24h]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.dns_queries_24h
        - name: 'ClassGuard: DNS log stream backlog'
          type: DEPENDENT
          key: 'classguard.metric[dns_log_stream_backlog]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.dns_log_stream_backlog
          description: 'DNS log entries sitting in Redis waiting to be written to TimescaleDB. A sustained climb means the log drain is stuck.'
          triggers:
            - expression: 'min(/ClassGuard node by Zabbix agent 2/classguard.metric[dns_log_stream_backlog],10m)>{$CLASSGUARD.DNS.BACKLOG.WARN}'
              name: 'ClassGuard: DNS log backlog above {$CLASSGUARD.DNS.BACKLOG.WARN} for 10m on {HOST.NAME}'
              priority: WARNING
        - name: 'ClassGuard: active student devices'
          type: DEPENDENT
          key: 'classguard.metric[active_students]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.active_students
        # ------------------------------------------------------------------
        # API process / host resources (as the app sees them)
        # ------------------------------------------------------------------
        - name: 'ClassGuard: API process RSS'
          type: DEPENDENT
          key: 'classguard.metric[nodejs_rss_mb]'
          delay: '0'
          value_type: FLOAT
          units: MB
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.nodejs_rss_mb
        - name: 'ClassGuard: API heap used'
          type: DEPENDENT
          key: 'classguard.metric[nodejs_heap_used_mb]'
          delay: '0'
          value_type: FLOAT
          units: MB
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.nodejs_heap_used_mb
        - name: 'ClassGuard: CPU load'
          type: DEPENDENT
          key: 'classguard.metric[os_cpu_load_pct]'
          delay: '0'
          value_type: FLOAT
          units: '%'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.os_cpu_load_pct
          triggers:
            - expression: 'min(/ClassGuard node by Zabbix agent 2/classguard.metric[os_cpu_load_pct],5m)>{$CLASSGUARD.CPU.WARN}'
              name: 'ClassGuard: CPU above {$CLASSGUARD.CPU.WARN}% for 5m on {HOST.NAME}'
              priority: AVERAGE
        - name: 'ClassGuard: memory used'
          type: DEPENDENT
          key: 'classguard.metric[os_mem_used_pct]'
          delay: '0'
          value_type: FLOAT
          units: '%'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.os_mem_used_pct
          triggers:
            - expression: 'min(/ClassGuard node by Zabbix agent 2/classguard.metric[os_mem_used_pct],5m)>{$CLASSGUARD.MEM.WARN}'
              name: 'ClassGuard: memory above {$CLASSGUARD.MEM.WARN}% for 5m on {HOST.NAME}'
              priority: AVERAGE
        - name: 'ClassGuard: disk used'
          type: DEPENDENT
          key: 'classguard.metric[os_disk_used_pct]'
          delay: '0'
          value_type: FLOAT
          units: '%'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.os_disk_used_pct
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[os_disk_used_pct])>{$CLASSGUARD.DISK.WARN}'
              name: 'ClassGuard: disk above {$CLASSGUARD.DISK.WARN}% on {HOST.NAME}'
              priority: HIGH
        # ------------------------------------------------------------------
        # PostgreSQL / DHCP / NTP
        # ------------------------------------------------------------------
        - name: 'ClassGuard: PostgreSQL connections'
          type: DEPENDENT
          key: 'classguard.metric[pg_connections_total]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.pg_connections_total
        - name: 'ClassGuard: Kea DHCP reachable'
          type: DEPENDENT
          key: 'classguard.metric[dhcp_kea_reachable]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.dhcp_kea_reachable
          description: 'Kea deliberately never runs on a standby node (read-only DB replica), so 0 on a standby is normal. The "Kea down on the ACTIVE node" trigger accounts for that.'
        - name: 'ClassGuard: DHCP pool utilization'
          type: DEPENDENT
          key: 'classguard.metric[dhcp_pool_utilization_pct]'
          delay: '0'
          value_type: FLOAT
          units: '%'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.dhcp_pool_utilization_pct
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[dhcp_pool_utilization_pct])>{$CLASSGUARD.DHCP.POOL.WARN}'
              name: 'ClassGuard: DHCP pool above {$CLASSGUARD.DHCP.POOL.WARN}% on {HOST.NAME}'
              priority: WARNING
        - name: 'ClassGuard: NTP synced'
          type: DEPENDENT
          key: 'classguard.metric[ntp_synced]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ntp_synced
          triggers:
            - expression: 'max(/ClassGuard node by Zabbix agent 2/classguard.metric[ntp_synced],10m)=0'
              name: 'ClassGuard: no reachable NTP server for 10m on {HOST.NAME}'
              priority: WARNING
        # ------------------------------------------------------------------
        # HA / VRRP — which node is active
        # ------------------------------------------------------------------
        - name: 'ClassGuard HA: configured'
          type: DEPENDENT
          key: 'classguard.metric[ha_configured]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ha_configured
        - name: 'ClassGuard HA: cluster nodes total'
          type: DEPENDENT
          key: 'classguard.metric[ha_nodes_total]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ha_nodes_total
        - name: 'ClassGuard HA: cluster nodes online'
          type: DEPENDENT
          key: 'classguard.metric[ha_nodes_online]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ha_nodes_online
        - name: 'ClassGuard HA: role'
          type: DEPENDENT
          key: 'classguard.metric[ha_role]'
          delay: '0'
          value_type: TEXT
          trends: '0'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ha_role
              error_handler: DISCARD_VALUE
        - name: 'ClassGuard HA: VRRP state'
          type: DEPENDENT
          key: 'classguard.metric[vrrp_state]'
          delay: '0'
          value_type: TEXT
          trends: '0'
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.vrrp_state
              error_handler: DISCARD_VALUE
          description: 'MASTER / BACKUP / FAULT as reported by keepalived''s notify hook. This is what tells Zabbix which server is active.'
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[vrrp_state],#1)<>last(/ClassGuard node by Zabbix agent 2/classguard.metric[vrrp_state],#2)'
              name: 'ClassGuard: VRRP role changed on {HOST.NAME} (failover event)'
              priority: AVERAGE
              manual_close: 'YES'
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[vrrp_state])="FAULT"'
              name: 'ClassGuard: keepalived reports FAULT on {HOST.NAME}'
              priority: HIGH
        - name: 'ClassGuard HA: is VRRP master'
          type: DEPENDENT
          key: 'classguard.metric[is_vrrp_master]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.is_vrrp_master
        - name: 'ClassGuard HA: DB replication lag'
          type: DEPENDENT
          key: 'classguard.metric[db_replication_lag_bytes]'
          delay: '0'
          value_type: UNSIGNED
          units: B
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.db_replication_lag_bytes
              error_handler: DISCARD_VALUE
          description: 'Null (discarded) on the primary — only standbys lag.'
          triggers:
            - expression: 'min(/ClassGuard node by Zabbix agent 2/classguard.metric[db_replication_lag_bytes],10m)>{$CLASSGUARD.LAG.WARN}'
              name: 'ClassGuard: DB replication lag above {$CLASSGUARD.LAG.WARN}B for 10m on {HOST.NAME}'
              priority: WARNING
        # ------------------------------------------------------------------
        # RADIUS / NAC (cluster-wide numbers — identical from every node)
        # ------------------------------------------------------------------
        - name: 'ClassGuard RADIUS: accepts (last 5m)'
          type: DEPENDENT
          key: 'classguard.metric[radius_auth_accepts_5m]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_auth_accepts_5m
        - name: 'ClassGuard RADIUS: rejects (last 5m)'
          type: DEPENDENT
          key: 'classguard.metric[radius_auth_rejects_5m]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_auth_rejects_5m
          triggers:
            - expression: 'min(/ClassGuard node by Zabbix agent 2/classguard.metric[radius_auth_rejects_5m],15m)>{$CLASSGUARD.REJECTS.WARN}'
              name: 'ClassGuard: sustained RADIUS rejects (>{$CLASSGUARD.REJECTS.WARN} per 5m for 15m)'
              priority: AVERAGE
        - name: 'ClassGuard RADIUS: active sessions'
          type: DEPENDENT
          key: 'classguard.metric[radius_sessions_active]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_sessions_active
        - name: 'ClassGuard RADIUS: devices pending approval'
          type: DEPENDENT
          key: 'classguard.metric[radius_devices_pending]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_devices_pending
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[radius_devices_pending])>{$CLASSGUARD.PENDING.WARN}'
              name: 'ClassGuard: RADIUS pending-device queue above {$CLASSGUARD.PENDING.WARN}'
              priority: WARNING
              description: 'Unknown MACs auto-register as pending. A spike usually means MAC randomization is enabled on managed devices, or unmanaged devices are hitting the corporate SSID.'
        - name: 'ClassGuard RADIUS: devices approved'
          type: DEPENDENT
          key: 'classguard.metric[radius_devices_approved]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_devices_approved
        - name: 'ClassGuard RADIUS: devices blocked'
          type: DEPENDENT
          key: 'classguard.metric[radius_devices_blocked]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_devices_blocked
        - name: 'ClassGuard RADIUS: active NAS clients'
          type: DEPENDENT
          key: 'classguard.metric[radius_nas_active]'
          delay: '0'
          value_type: UNSIGNED
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.radius_nas_active
          description: 'Auto-discovered APs/switches currently online (is_active mirrors controller device status at sync).'
        # ------------------------------------------------------------------
        # Certificates
        # ------------------------------------------------------------------
        - name: 'ClassGuard: ACME TLS cert days remaining'
          type: DEPENDENT
          key: 'classguard.metric[tls_cert_days_remaining]'
          delay: '0'
          value_type: FLOAT
          master_item:
            key: classguard.api.metrics
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.tls_cert_days_remaining
              error_handler: DISCARD_VALUE
          description: 'Web UI cert; also the EAP cert when ACME is enabled. Null (discarded) until a cert has been issued.'
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.metric[tls_cert_days_remaining])<{$CLASSGUARD.CERT.WARN.DAYS}'
              name: 'ClassGuard: TLS certificate expires in under {$CLASSGUARD.CERT.WARN.DAYS} days'
              priority: HIGH
        - name: 'ClassGuard: EAP cert days remaining (on-disk)'
          type: ZABBIX_PASSIVE
          key: classguard.eap.cert.days
          delay: 1h
          value_type: FLOAT
          description: 'Read straight from /etc/freeradius/3.0/certs/server.crt — covers the self-signed case where the API has no expiry to report. -1 means the agent could not read the cert (check the freerad group).'
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.eap.cert.days)>=0 and last(/ClassGuard node by Zabbix agent 2/classguard.eap.cert.days)<{$CLASSGUARD.CERT.WARN.DAYS}'
              name: 'ClassGuard: EAP certificate expires in under {$CLASSGUARD.CERT.WARN.DAYS} days on {HOST.NAME}'
              priority: HIGH
            - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.eap.cert.days)=-1'
              name: 'ClassGuard: EAP certificate unreadable by the agent on {HOST.NAME}'
              priority: INFO
        # ------------------------------------------------------------------
        # Host services (outside Docker)
        # ------------------------------------------------------------------
        - name: 'FreeRADIUS: service state'
          type: ZABBIX_PASSIVE
          key: 'systemd.unit.info["freeradius.service",ActiveState]'
          delay: 1m
          value_type: TEXT
          trends: '0'
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/systemd.unit.info["freeradius.service",ActiveState])<>"active"'
              name: 'ClassGuard: FreeRADIUS is not running on {HOST.NAME}'
              priority: HIGH
        - name: 'FreeRADIUS: listening on 1812/udp'
          type: ZABBIX_PASSIVE
          key: 'net.udp.listen[1812]'
          delay: 1m
          value_type: UNSIGNED
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/net.udp.listen[1812])=0'
              name: 'ClassGuard: nothing listening on 1812/udp on {HOST.NAME}'
              priority: HIGH
        - name: 'keepalived: service state'
          type: ZABBIX_PASSIVE
          key: 'systemd.unit.info["keepalived.service",ActiveState]'
          delay: 1m
          value_type: TEXT
          trends: '0'
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/systemd.unit.info["keepalived.service",ActiveState])<>"active"'
              name: 'ClassGuard: keepalived is not running on {HOST.NAME}'
              priority: HIGH
        - name: 'ClassGuard update watcher: timer state'
          type: ZABBIX_PASSIVE
          key: 'systemd.unit.info["classguard-update-watcher.timer",ActiveState]'
          delay: 5m
          value_type: TEXT
          trends: '0'
          triggers:
            - expression: 'last(/ClassGuard node by Zabbix agent 2/systemd.unit.info["classguard-update-watcher.timer",ActiveState])<>"active"'
              name: 'ClassGuard: update-watcher timer is not active on {HOST.NAME}'
              priority: WARNING
        - name: 'ClassGuard: failed-update log count'
          type: ZABBIX_PASSIVE
          key: classguard.update.failed.count
          delay: 5m
          value_type: UNSIGNED
          description: 'The watcher never deletes old failure logs, so alert on the count increasing, not on it being non-zero.'
          triggers:
            - expression: 'change(/ClassGuard node by Zabbix agent 2/classguard.update.failed.count)>0'
              name: 'ClassGuard: a scheduled update FAILED on {HOST.NAME}'
              priority: HIGH
              manual_close: 'YES'
        - name: 'ClassGuard: last failed-update timestamp'
          type: ZABBIX_PASSIVE
          key: classguard.update.failed.latest
          delay: 5m
          value_type: UNSIGNED
          units: unixtime
        - name: 'ClassGuard: holds the VIP'
          type: ZABBIX_PASSIVE
          key: 'classguard.vip.held[{$CLASSGUARD.VIP}]'
          delay: 1m
          value_type: UNSIGNED
          description: 'Host-level ground truth (ip addr) — set {$CLASSGUARD.VIP} first.'
      discovery_rules:
        - name: 'ClassGuard containers'
          key: 'docker.containers.discovery[true]'
          delay: 15m
          description: 'Discovers classguard-* containers, including stopped ones (so a stopped container alerts instead of disappearing).'
          filter:
            evaltype: AND_OR
            conditions:
              - macro: '{#NAME}'
                value: '{$CLASSGUARD.CONTAINER.MATCHES}'
                formulaid: A
          item_prototypes:
            - name: 'Container {#NAME}: info (raw)'
              key: 'docker.container_info["{#NAME}",full]'
              delay: 1m
              value_type: TEXT
              history: '0'
              trends: '0'
            - name: 'Container {#NAME}: stats (raw)'
              key: 'docker.container_stats["{#NAME}"]'
              delay: 1m
              value_type: TEXT
              history: '0'
              trends: '0'
            - name: 'Container {#NAME}: running'
              type: DEPENDENT
              key: 'classguard.container.running["{#NAME}"]'
              delay: '0'
              value_type: UNSIGNED
              master_item:
                key: 'docker.container_info["{#NAME}",full]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.State.Running
                - type: BOOL_TO_DECIMAL
                  parameters:
                    - ''
              trigger_prototypes:
                - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.container.running["{#NAME}"])=0'
                  name: 'ClassGuard: container {#NAME} is not running on {HOST.NAME}'
                  priority: HIGH
            - name: 'Container {#NAME}: OOM-killed'
              type: DEPENDENT
              key: 'classguard.container.oom["{#NAME}"]'
              delay: '0'
              value_type: UNSIGNED
              master_item:
                key: 'docker.container_info["{#NAME}",full]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.State.OOMKilled
                - type: BOOL_TO_DECIMAL
                  parameters:
                    - ''
              trigger_prototypes:
                - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.container.oom["{#NAME}"])=1'
                  name: 'ClassGuard: container {#NAME} was OOM-killed on {HOST.NAME}'
                  priority: HIGH
            - name: 'Container {#NAME}: restart count'
              type: DEPENDENT
              key: 'classguard.container.restarts["{#NAME}"]'
              delay: '0'
              value_type: UNSIGNED
              master_item:
                key: 'docker.container_info["{#NAME}",full]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.RestartCount
              trigger_prototypes:
                - expression: 'change(/ClassGuard node by Zabbix agent 2/classguard.container.restarts["{#NAME}"])>0'
                  name: 'ClassGuard: container {#NAME} restarted on {HOST.NAME}'
                  priority: INFO
                  manual_close: 'YES'
            - name: 'Container {#NAME}: memory usage'
              type: DEPENDENT
              key: 'classguard.container.mem["{#NAME}"]'
              delay: '0'
              value_type: UNSIGNED
              units: B
              master_item:
                key: 'docker.container_stats["{#NAME}"]'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.memory_stats.usage
                  error_handler: DISCARD_VALUE
      macros:
        - macro: '{$CLASSGUARD.CERT.WARN.DAYS}'
          value: '14'
          description: 'Alert when a TLS/EAP cert has fewer days left than this'
        - macro: '{$CLASSGUARD.CONTAINER.MATCHES}'
          value: '^/?classguard'
          description: 'LLD filter for which containers to monitor'
        - macro: '{$CLASSGUARD.CPU.WARN}'
          value: '90'
        - macro: '{$CLASSGUARD.DHCP.POOL.WARN}'
          value: '90'
        - macro: '{$CLASSGUARD.DISK.WARN}'
          value: '90'
        - macro: '{$CLASSGUARD.DNS.BACKLOG.WARN}'
          value: '10000'
        - macro: '{$CLASSGUARD.LAG.WARN}'
          value: '52428800'
          description: 'DB replication lag threshold in bytes (default 50MB)'
        - macro: '{$CLASSGUARD.MEM.WARN}'
          value: '90'
        - macro: '{$CLASSGUARD.PENDING.WARN}'
          value: '100'
        - macro: '{$CLASSGUARD.REJECTS.WARN}'
          value: '20'
        - macro: '{$CLASSGUARD.VIP}'
          value: '0.0.0.0'
          description: 'Your keepalived VIP. Set it, then enable the "VRRP role disagrees with VIP ownership" trigger.'
  triggers:
    # Multi-item triggers live at export level, same as Zabbix's own exports.
    - expression: 'max(/ClassGuard node by Zabbix agent 2/classguard.metric[ha_nodes_online],5m)<last(/ClassGuard node by Zabbix agent 2/classguard.metric[ha_nodes_total])'
      name: 'ClassGuard: a cluster peer is offline (reported by {HOST.NAME})'
      priority: HIGH
      description: 'Fires on every surviving node — the dead node cannot report itself. If only one node reports it, suspect that node''s own DB/heartbeat instead.'
    - expression: 'max(/ClassGuard node by Zabbix agent 2/classguard.metric[dhcp_kea_reachable],5m)=0 and last(/ClassGuard node by Zabbix agent 2/classguard.metric[is_vrrp_master])=1'
      name: 'ClassGuard: Kea DHCP down on the ACTIVE node {HOST.NAME}'
      priority: HIGH
      description: 'Kea being down on a standby is by design; on the VRRP master it means no leases are being served.'
    - expression: 'last(/ClassGuard node by Zabbix agent 2/classguard.vip.held[{$CLASSGUARD.VIP}])<>last(/ClassGuard node by Zabbix agent 2/classguard.metric[is_vrrp_master])'
      name: 'ClassGuard: VRRP role disagrees with actual VIP ownership on {HOST.NAME}'
      priority: HIGH
      status: DISABLED
      description: 'keepalived''s notify hook says one thing, ip addr says another — stale vrrp_state in the DB or a VIP left behind. Enable after setting {$CLASSGUARD.VIP}.'
