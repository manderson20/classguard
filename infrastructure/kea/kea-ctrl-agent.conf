{
  "Control-agent": {
    "http-host":  "0.0.0.0",
    "http-port":  8000,

    "control-sockets": {
      "dhcp4": {
        "socket-type": "unix",
        "socket-name": "/var/run/kea/kea4-ctrl.sock"
      }
    },

    "loggers": [
      {
        "name":         "kea-ctrl-agent",
        "output_options": [
          { "output": "/var/log/kea/kea-ctrl-agent.log" }
        ],
        "severity": "INFO"
      }
    ]
  }
}
