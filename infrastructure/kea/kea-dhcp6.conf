{
  "Dhcp6": {
    "interfaces-config": {
      "interfaces": ["*"]
    },

    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea6-ctrl.sock"
    },

    "lease-database": {
      "type":     "postgresql",
      "host":     "postgres",
      "port":     5432,
      "name":     "classguard_kea",
      "user":     "classguard",
      "password": "${DB_PASSWORD}"
    },

    "hosts-database": {
      "type":     "postgresql",
      "host":     "postgres",
      "port":     5432,
      "name":     "classguard_kea",
      "user":     "classguard",
      "password": "${DB_PASSWORD}"
    },

    "preferred-lifetime": 43200,
    "valid-lifetime":     86400,
    "renew-timer":        21600,
    "rebind-timer":       37800,

    // Same shared-DB multi-node reasoning as DHCPv4 — random allocator prevents
    // simultaneous offers to the same client hitting two different nodes.
    "allocator":       "random",
    "cache-threshold": 0.25,

    "subnet6": [],

    "hooks-libraries": [
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_pgsql.so"
      },
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_lease_cmds.so"
      },
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_stat_cmds.so"
      }
    ],

    "loggers": [
      {
        "name":         "kea-dhcp6",
        "output_options": [
          { "output": "/var/log/kea/kea-dhcp6.log" }
        ],
        "severity": "INFO"
      }
    ]
  }
}
