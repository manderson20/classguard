{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["*"],
      "dhcp-socket-type": "raw"
    },

    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/var/run/kea/kea4-ctrl.sock"
    },

    "lease-database": {
      "type":     "postgresql",
      "host":     "postgres",
      "port":     5432,
      "name":     "classguard_kea",
      "user":     "classguard",
      "password": "${DB_PASSWORD}"
    },

    "hosts-database": {
      "type":     "postgresql",
      "host":     "postgres",
      "port":     5432,
      "name":     "classguard_kea",
      "user":     "classguard",
      "password": "${DB_PASSWORD}"
    },

    "valid-lifetime":    86400,
    "renew-timer":       43200,
    "rebind-timer":      75600,

    "option-data": [
      {
        "name": "domain-name-servers",
        "data": "127.0.0.1"
      }
    ],

    "subnet4": [],

    "hooks-libraries": [
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_lease_cmds.so"
      }
    ],

    "loggers": [
      {
        "name":         "kea-dhcp4",
        "output_options": [
          { "output": "/var/log/kea/kea-dhcp4.log" }
        ],
        "severity": "INFO"
      }
    ]
  }
}
