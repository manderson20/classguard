# ClassGuard — Production Nginx Configuration
# ============================================
# Requires: nginx >= 1.18, certbot with nginx plugin
#
# Setup:
#   1. Copy to /etc/nginx/sites-available/classguard
#   2. Replace SERVER_NAME with your domain, e.g. classguard.school.org
#   3. Obtain TLS certificates:
#        certbot --nginx -d SERVER_NAME
#   4. Enable: ln -s /etc/nginx/sites-available/classguard \
#                     /etc/nginx/sites-enabled/classguard
#   5. Test and reload: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME;

    # Redirect all plain HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Allow certbot ACME challenge over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name SERVER_NAME;

    # ---------------------------------------------------------------------------
    # TLS — managed by Certbot; do not edit these paths manually
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/SERVER_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SERVER_NAME/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()"      always;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    access_log /var/log/nginx/classguard_access.log;
    error_log  /var/log/nginx/classguard_error.log warn;

    # ---------------------------------------------------------------------------
    # Gzip
    # ---------------------------------------------------------------------------
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ---------------------------------------------------------------------------
    # React frontend — served from dist/
    # ---------------------------------------------------------------------------
    root  /opt/classguard/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Static assets — long cache
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---------------------------------------------------------------------------
    # Backend API + WebSocket proxy → Node.js on port 3001
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        client_max_body_size 5m;
    }

    # Socket.io upgrade path
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Health check (used by monitoring tools)
    location /health {
        proxy_pass       http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ---------------------------------------------------------------------------
    # DNS-over-HTTPS endpoint — proxies to the dns-engine on port 5300/DoH
    # ---------------------------------------------------------------------------
    location /dns-query {
        proxy_pass         http://127.0.0.1:5380/dns-query;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Required content types for RFC 8484
        proxy_set_header   Accept          "application/dns-message";
    }
}
