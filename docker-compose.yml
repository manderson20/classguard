networks:
  classguard-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kea-logs:
  app-logs:
  blocklists:
  screenshots:
  tls-certs:
  extension-dist:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 + TimescaleDB
  #
  # Pinned to the exact version currently deployed (15.18 / TimescaleDB
  # 2.27.2) rather than :latest-pg15, which floats to whatever's newest on
  # every pull with no diff to review. Bumping this tag is now a deliberate,
  # reviewable change instead of something that can happen silently.
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.27.2-pg15
    container_name: classguard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       classguard
      POSTGRES_USER:     classguard
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-kea-db.sh:/docker-entrypoint-initdb.d/init-kea-db.sh:ro
    networks:
      - classguard-net
    # Only published when this node is acting as a replication source for
    # another node — bound to the LAN IP (never 0.0.0.0) so it's reachable
    # from other servers on the network but not the public internet. The
    # replicator role + pg_hba.conf still gate who can actually connect.
    ports:
      - "${CLASSGUARD_HOST:-172.16.1.250}:5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U classguard"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ---------------------------------------------------------------------------
  # Redis 7 — pinned to the exact running version (7.4.9), same rationale as
  # the postgres image above.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4.9-alpine
    container_name: classguard-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - classguard-net
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ---------------------------------------------------------------------------
  # Database migrations — runs once and exits
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: classguard-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://classguard:${DB_PASSWORD}@postgres:5432/classguard
    command: node src/scripts/migrate.js
    networks:
      - classguard-net

  # ---------------------------------------------------------------------------
  # Chrome extension builder — long-running poller (scripts/watch.js).
  # Bakes the OAuth client_id into manifest.json (chrome.identity.getAuthToken
  # requires it to be static there, so the extension can't be a single
  # universal binary the way the backend-URL discovery via chrome.storage.managed
  # is) and zips dist/ to the extension-dist volume, where nginx serves it.
  # Polls Settings > Integrations > Chrome Extension (via the backend, stored
  # in Postgres) every ~60s and rebuilds automatically when it changes — no
  # more manually re-running this after editing .env on every HA node.
  # A code/version change (not just config) still needs an image rebuild:
  #   docker compose build extension-builder && docker compose up -d extension-builder
  # ---------------------------------------------------------------------------
  extension-builder:
    build:
      context:    ./chrome-extension
      dockerfile: Dockerfile
    container_name: classguard-extension-builder
    restart: unless-stopped
    env_file: .env
    volumes:
      - extension-dist:/output
    depends_on:
      - api
    networks:
      - classguard-net

  # ---------------------------------------------------------------------------
  # ClassGuard API + WebSocket server
  # ---------------------------------------------------------------------------
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: classguard-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    hostname: classguard-api
    environment:
      DATABASE_URL:          postgresql://classguard:${DB_PASSWORD}@postgres:5432/classguard
      REDIS_URL:             redis://redis:6379
      KEA_CONTROL_AGENT_URL: http://kea:8000
      BACKEND_URL:           http://api:3001
      SCREENSHOT_DIR:        /app/screenshots
      NODE_ID:               ${NODE_ID:-classguard-1}
      NODE_ROLE:             ${NODE_ROLE:-primary}
      TLS_CERT_DIR:          /app/certs
    volumes:
      - app-logs:/app/logs
      - blocklists:/app/blocklists
      - screenshots:/app/screenshots
      - tls-certs:/app/certs
    networks:
      - classguard-net
    # Localhost-only — lets keepalived's host-level vrrp_script health check
    # (curl http://localhost:3001/health) actually reach the container; it
    # runs outside Docker, so it can't resolve the api:3001 hostname/port
    # that other containers use internally.
    ports:
      - "127.0.0.1:3001:3001"
    # NET_RAW — fping needs raw ICMP sockets for the IPAM presence-scan job (pingScan.js)
    cap_add:
      - NET_RAW
    healthcheck:
      test:         ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval:     15s
      timeout:      5s
      start_period: 20s
      retries:      5

  # ---------------------------------------------------------------------------
  # ClassGuard DNS Filtering Engine
  # ---------------------------------------------------------------------------
  dns:
    build:
      context:    ./dns-engine
      dockerfile: Dockerfile
    container_name: classguard-dns
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL:   redis://redis:6379
      BACKEND_URL: http://api:3001
    ports:
      - "${DNS_BIND_IP:-172.16.1.250}:53:53/udp"
      - "${DNS_BIND_IP:-172.16.1.250}:53:53/tcp"
    networks:
      - classguard-net
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test:         ["CMD-SHELL", "wget -qO- http://localhost:3053/health || exit 1"]
      interval:     15s
      timeout:      5s
      start_period: 10s
      retries:      3

  # ---------------------------------------------------------------------------
  # ISC Kea DHCP Server + Control Agent
  # ---------------------------------------------------------------------------
  kea:
    build:
      context:    ./infrastructure/kea
      dockerfile: Dockerfile
    container_name: classguard-kea
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./infrastructure/kea/kea-dhcp4.conf:/etc/kea/kea-dhcp4.conf:ro
      - ./infrastructure/kea/kea-ctrl-agent.conf:/etc/kea/kea-ctrl-agent.conf:ro
      - kea-logs:/var/log/kea
    ports:
      - "67:67/udp"
    networks:
      - classguard-net
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test:         ["CMD-SHELL", "curl -sf -X POST http://localhost:8000 -H 'Content-Type: application/json' -d '{\"command\":\"version-get\",\"service\":[\"dhcp4\"]}' || exit 1"]
      interval:     20s
      timeout:      5s
      start_period: 15s
      retries:      3

  # ---------------------------------------------------------------------------
  # StrongSwan IKEv2 VPN — staff remote access. Certificate-based auth,
  # trusting ClassGuard's own CA (services/ca.js, see migration 053) — the
  # same CA the scep service below issues client certs from via Mosyle's
  # SCEP profile. Not Mosyle's own cert; Mosyle never had one to give.
  #
  # network_mode: host, unlike every other service here — IKEv2/ESP need
  # direct access to the host's real interfaces and routing table to bind
  # the VRRP VIP correctly and to forward decrypted tunnel traffic into the
  # LAN. Docker's bridge network would NAT all of that away. This is the
  # same reason keepalived itself runs directly on the host rather than in
  # a container. A side effect: this container isn't on classguard-net, so
  # vpn-agent.py reaches the API at 127.0.0.1:3001 — the exact same path
  # keepalived's own host-level health check already uses for the same
  # reason (see api's "127.0.0.1:3001:3001" port binding above).
  # ---------------------------------------------------------------------------
  vpn:
    build:
      context:    ./infrastructure/vpn
      dockerfile: Dockerfile
    container_name: classguard-vpn
    restart: unless-stopped
    network_mode: host
    depends_on:
      api:
        condition: service_healthy
    env_file: .env
    volumes:
      - tls-certs:/certs:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW

  # ---------------------------------------------------------------------------
  # SCEP server — issues the client certs the vpn service above trusts, from
  # ClassGuard's own CA, when a Mosyle-managed device enrolls via its SCEP
  # profile (URL/challenge generated on the VPN admin page).
  #
  # Unlike vpn, this is a plain HTTP server with no need to touch interfaces
  # or routing — normal classguard-net bridge service, reached publicly only
  # through nginx's /scep/ proxy (frontend/nginx.conf), riding the existing
  # domain and Let's Encrypt cert. Never publishes a host port directly.
  # ---------------------------------------------------------------------------
  scep:
    build:
      context:    ./infrastructure/scep
      dockerfile: Dockerfile
    container_name: classguard-scep
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    env_file: .env
    networks:
      - classguard-net

  # ---------------------------------------------------------------------------
  # Frontend — React app built with Vite, served by nginx
  # nginx also proxies /api/ and /socket.io/ to the api container
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: classguard-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Hostname/IP that admins use to reach ClassGuard.
      # Requests to this host serve the admin SPA; all other hostnames
      # (DNS-sinkhled blocked domains) serve the block page.
      CLASSGUARD_HOST: ${CLASSGUARD_HOST:-172.16.1.250}
      # VRRP floating IP (HA Cluster page), if configured — so the admin UI
      # loads correctly when reached via the virtual IP, not just this
      # node's own real address. Blank/unset on a non-HA node.
      VRRP_VIP: ${VRRP_VIP:-}
      # Public domain name a Let's Encrypt cert was issued for (Settings ->
      # TLS), if any — must be in server_name too, or visits to the domain
      # itself fall through to the default_server block page instead of the
      # admin SPA, on both plain HTTP and (once a cert covers it) HTTPS.
      CLASSGUARD_DOMAIN: ${CLASSGUARD_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - tls-certs:/etc/nginx/certs
      - extension-dist:/usr/share/nginx/html/downloads:ro
    networks:
      - classguard-net
