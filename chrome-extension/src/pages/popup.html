<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClassGuard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 300px;
      color: #1e293b;
      background: #fff;
    }

    header {
      background: #1a56db;
      color: #fff;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header .logo { width: 22px; height: 22px; display: block; }
    header h1    { font-size: 15px; font-weight: 700; }
    header .sub  { font-size: 11px; opacity: .8; margin-top: 1px; }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      gap: 8px;
    }
    .label { color: #64748b; font-size: 12px; margin-bottom: 2px; }
    .value { font-weight: 600; font-size: 13px; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green  { background: #22c55e; }
    .dot.yellow { background: #f59e0b; }
    .dot.red    { background: #ef4444; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge.lesson   { background: #dbeafe; color: #1d4ed8; }
    .badge.penalty  { background: #fef3c7; color: #92400e; }
    .badge.standard { background: #f0fdf4; color: #166534; }

    .loading { color: #94a3b8; font-size: 13px; padding: 20px 16px; text-align: center; }

    footer {
      padding: 10px 16px;
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 7px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #475569;
      transition: background .15s;
    }
    button:hover    { background: #f8fafc; }
    button.primary  { background: #1a56db; color: #fff; border-color: #1a56db; }
    button.primary:hover { background: #1e40af; }
    button.danger   { color: #dc2626; border-color: #fecaca; }
    button.danger:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="icons/icon48.png" alt="ClassGuard">
    <div>
      <h1>ClassGuard</h1>
      <div class="sub" id="header-sub">Loading…</div>
    </div>
  </header>

  <div id="content" class="loading">Loading status…</div>

  <footer>
    <button id="btn-sync" class="primary">Sync Policy</button>
  </footer>

  <!-- popup.bundle.js injected by HtmlWebpackPlugin -->
</body>
</html>
