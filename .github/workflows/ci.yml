name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        # Must match docker-compose.yml's actual postgres image -- migration
        # 003 enables the timescaledb extension (for dns_logs), which plain
        # postgres:15-alpine doesn't have.
        image: timescale/timescaledb:2.27.2-pg15
        env:
          POSTGRES_DB: classguard_test
          POSTGRES_USER: classguard
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://classguard:testpassword@localhost:5432/classguard_test
        run: node src/scripts/migrate.js

      - name: Run tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://classguard:testpassword@localhost:5432/classguard_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-for-production
        run: npm test --if-present

  dns-engine:
    name: DNS Engine — lint & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dns-engine

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dns-engine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://classguard.example.org

  chrome-extension:
    name: Chrome Extension — build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chrome-extension

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chrome-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build
        env:
          BACKEND_URL:      https://classguard.example.org
          GOOGLE_CLIENT_ID: placeholder-ci-client-id.apps.googleusercontent.com

      - name: Verify dist output
        run: |
          test -f dist/manifest.json
          test -f dist/service-worker.bundle.js
          test -f dist/popup.html
          test -f dist/blocked.html

  docker-compose-check:
    name: Docker Compose — validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # docker-compose.yml's env_file directives expect a real .env to
      # exist -- there's no actual secrets needed just to validate that
      # the compose file itself parses and resolves correctly, so the
      # checked-in example file (placeholder values only) is sufficient.
      - name: Create placeholder .env
        run: sed 's/YOUR_SERVER_IP/10.0.0.1/g' .env.example > .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
